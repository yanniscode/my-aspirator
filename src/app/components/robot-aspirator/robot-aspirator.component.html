<div class="robot" [style.width.px]="aspiroViewSize" [style.height.px]="aspiroViewSize"
  [style.left.px]="currentCoordinates().x" [style.top.px]="currentCoordinates().y">
  <img src="/assets/megaman.png" alt='R' />
  <div class="robot-label" [style.color]="robotColor">{{robotViewModel()?.robotName ?? "Theodule" }}</div>
  <div class="robot-batterie-label" [style.color]="robotColor">{{robotViewModel()?.batterie ?? -1 }}</div>
</div>
