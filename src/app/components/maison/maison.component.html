<div class="game-container">

  <div class="maison">
    <p-table [value]="this.maisonViewModel.maison" @maisonAnimation class="table-maison" cellspacing="0"
      cellpadding="0">
      <ng-template pTemplate="body" let-rowData>
        <tr class="tr-maison">
          @for (cell of rowData; track cell) {
          <td class="td-maison">
            @if (cell.cellStack[0].type === 'O') {
            <img src="/assets/texture-non-visitee.png" alt='O' />
            }
            @if (cell.cellStack[0].type === 'X') {
            <img src="/assets/texture-mur.png" alt='X' />
            }
            @if (cell.cellStack[0].type === 'B') {
            <img src="/assets/texture-base.png" alt='B' />
            }
            @if (cell.cellStack[0].type === '_') {
            <img src="/assets/texture-visitee.png" alt='_' />
            }
          </td>
          }
        </tr>
      </ng-template>
    </p-table>

    <canvas #maisonCanvas class="table-maison" width="500" height="400"></canvas>
  </div>
</div>
